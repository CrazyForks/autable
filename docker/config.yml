server:
  address: "0.0.0.0:8080"
data:
  path: "/data"
repository:
  path: "/repository"
  remote_url: "https://YOUR_PAT@github.com/example/autable-repository.git"
  remote_branch: "main"
  sync:
    debounce: "2s"
    push_timeout: "30s"
    author_name: "autable"
    author_email: "autable@example.local"
auth:
  password:
    enabled: true
  oidc:
    enabled: false
    providers: []
