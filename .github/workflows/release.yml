name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version bump"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.version.outputs.commit }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Compute release version
        id: version
        shell: bash
        run: |
          bump="${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}"
          latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest" ]; then
            current="$(node -p "require('./web/package.json').version")"
          else
            current="${latest#v}"
          fi
          if [[ ! "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unsupported current version: $current" >&2
            exit 1
          fi
          IFS=. read -r major minor patch <<< "$current"
          case "$bump" in
            major)
              major=$((major + 1)); minor=0; patch=0
              ;;
            minor)
              minor=$((minor + 1)); patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "unsupported bump: $bump" >&2
              exit 1
              ;;
          esac
          next="${major}.${minor}.${patch}"
          tag="v${next}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "release tag already exists: $tag" >&2
            exit 1
          fi
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            binary: autable
          - target: darwin-amd64
            runner: macos-13
            binary: autable
          - target: darwin-arm64
            runner: macos-14
            binary: autable
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend for embedding
        shell: bash
        run: |
          npm ci --prefix web
          npm --prefix web test -- --run
          ./scripts/embed-web.sh
      - name: Test Go
        shell: bash
        run: go test ./...
      - name: Build binary
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          commit="$(git rev-parse --short HEAD)"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p release
          CGO_ENABLED=1 go build \
            -ldflags "-s -w -X autable/internal/version.Version=${version} -X autable/internal/version.Commit=${commit} -X autable/internal/version.BuiltAt=${built_at}" \
            -o "release/${{ matrix.binary }}" \
            ./cmd/autable
          tar -czf "autable-${version}-${{ matrix.target }}.tar.gz" -C release "${{ matrix.binary }}"
      - uses: actions/upload-artifact@v4
        with:
          name: autable-${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: autable-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          commit="${{ needs.prepare.outputs.commit }}"
          gh release create "v${version}" artifacts/*.tar.gz \
            --target "$commit" \
            --title "autable v${version}" \
            --notes "Automated release for autable v${version}."
